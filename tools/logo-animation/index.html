<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        background: #060d1e;
      }

      /* Background atmosphere */
      .bg-glow {
        position: absolute;
        width: 880px;
        height: 880px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(36, 60, 160, 0.22) 0%,
          rgba(6, 13, 30, 0) 68%
        );
        top: 50%;
        left: 50%;
        transform: translate(-50%, -52%);
      }

      /* Faint grid texture */
      .ghost-grid {
        position: absolute;
        inset: 0;
        opacity: 0.03;
        background-image:
          linear-gradient(rgba(130, 160, 255, 1) 1px, transparent 1px),
          linear-gradient(90deg, rgba(130, 160, 255, 1) 1px, transparent 1px);
        background-size: 72px 72px;
      }

      /* Corner registration marks */
      .reg-mark {
        position: absolute;
        width: 22px;
        height: 22px;
        opacity: 0.13;
      }
      .reg-mark::before,
      .reg-mark::after {
        content: "";
        position: absolute;
        background: #8aaafe;
      }
      .reg-mark::before {
        width: 100%;
        height: 1px;
        top: 50%;
      }
      .reg-mark::after {
        width: 1px;
        height: 100%;
        left: 50%;
      }
      .reg-tl {
        top: 52px;
        left: 52px;
      }
      .reg-tr {
        top: 52px;
        right: 52px;
      }
      .reg-bl {
        bottom: 52px;
        left: 52px;
      }
      .reg-br {
        bottom: 52px;
        right: 52px;
      }

      /* Edge vignette */
      .vignette {
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse 82% 82% at 50% 50%,
          transparent 44%,
          rgba(3, 7, 18, 0.58) 100%
        );
        pointer-events: none;
      }

      /* Logo elements — positioned to match PSD layout relationships */
      .logo-layer {
        position: absolute;
        image-rendering: high-quality;
      }

      /*
        PSD logomark: 1237×1416 at (2436,547)
        Scale factor: 0.438 (620px drop height in 1080 canvas)
        Centered: logomark origin at (269, 230)
      */
      #drop-img {
        /* 866×1416 → 379×620, offset (78, 0) from logomark origin */
        left: 347px;
        top: 230px;
        width: 379px;
        height: 620px;
        opacity: 0;
      }

      #moon-img {
        /* 872×883 → 382×387, offset (80, 239) from logomark origin */
        left: 349px;
        top: 469px;
        width: 382px;
        height: 387px;
        opacity: 0;
        transform-origin: 50% 50%;
      }

      #dots-img {
        /* 1237×205 → 542×90, offset (0, 354) from logomark origin */
        left: 269px;
        top: 584px;
        width: 542px;
        height: 90px;
        opacity: 0;
      }

      /* Moon bloom — soft glow behind the crescent */
      #moon-bloom {
        position: absolute;
        left: 410px;
        top: 530px;
        width: 260px;
        height: 260px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(90, 128, 224, 0.28) 0%,
          rgba(90, 128, 224, 0) 70%
        );
        filter: blur(30px);
        opacity: 0;
        transform-origin: 50% 50%;
      }

      /* Wordmark */
      #wordmark {
        position: absolute;
        left: 0;
        top: 875px;
        width: 100%;
        text-align: center;
        font-family: "Montserrat", sans-serif;
        font-weight: 300;
        font-size: 80px;
        letter-spacing: 0.32em;
        color: #8ca8d4;
        opacity: 0;
      }

      /* Drop shadow */
      #drop-shadow {
        position: absolute;
        left: 400px;
        top: 830px;
        width: 280px;
        height: 18px;
        border-radius: 50%;
        background: rgba(26, 48, 128, 0.2);
        filter: blur(6px);
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="nocturne-logo"
      data-start="0"
      data-duration="6"
      data-width="1080"
      data-height="1080"
    >
      <!-- Decorative background layers -->
      <div class="bg-glow" data-layout-ignore></div>
      <div class="ghost-grid" data-layout-ignore></div>
      <div class="reg-mark reg-tl" data-layout-ignore></div>
      <div class="reg-mark reg-tr" data-layout-ignore></div>
      <div class="reg-mark reg-bl" data-layout-ignore></div>
      <div class="reg-mark reg-br" data-layout-ignore></div>

      <!-- Drop shadow -->
      <div id="drop-shadow" data-layout-ignore></div>

      <!-- Drop — actual logo asset (bottom layer) -->
      <img id="drop-img" class="logo-layer" src="assets/drop.png" alt="" />

      <!-- Glucose dots arc — in front of drop, behind moon -->
      <img id="dots-img" class="logo-layer" src="assets/dots.png" alt="" />

      <!-- Moon bloom glow -->
      <div id="moon-bloom" data-layout-ignore></div>

      <!-- Moon crescent — clipped by animated evenodd path (top layer) -->
      <img id="moon-img" class="logo-layer" src="assets/moon.png" alt="" />

      <!-- Wordmark -->
      <div id="wordmark">nocturne</div>

      <!-- Vignette -->
      <div class="vignette" data-layout-ignore></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // ─── DROP ENTRANCE  0.15 → 1.15s ─────────────────────────────────────────
      // Circle → teardrop: starts small and clipped to the round bulb,
      // scales up while the clip expands to reveal the pointed tip.
      // Single tween — no delay between fade and shape change.
      tl.fromTo(
        "#drop-img",
        {
          opacity: 1,
          scale: 0.4,
          clipPath: "circle(18% at 50% 62%)",
          transformOrigin: "50% 62%",
        },
        {
          opacity: 1,
          scale: 1.0,
          clipPath: "circle(75% at 50% 50%)",
          transformOrigin: "50% 62%",
          duration: 1.0,
          ease: "expo.out",
        },
        0.15,
      );
      tl.fromTo(
        "#drop-shadow",
        { opacity: 0 },
        { opacity: 1, duration: 0.55, ease: "power2.out" },
        0.6,
      );

      // ─── MOON ENTRANCE  0.15 → 1.25s (simultaneous with drop) ────────────────
      // Waxing crescent via evenodd clip-path: a rectangle (full moon area)
      // minus a circle (the shadow). The shadow circle starts large and
      // centered — hiding everything — then shrinks and slides upper-right,
      // exactly how the earth's shadow recedes during a waxing crescent.
      //
      // Moon element: 382×387px.
      // Shadow start: cx=191 cy=194 r=230 — covers entire image.
      // Shadow end:   cx=255 cy=145 r=155 — matches the crescent's inner curve.

      const moonEl = document.getElementById("moon-img");
      const shadow = { cx: 191, cy: 194, r: 230 };

      function moonClipPath(cx, cy, r) {
        return (
          'path(evenodd,"M0 0L382 0L382 387L0 387Z' +
          " M" +
          cx +
          " " +
          (cy - r) +
          " A" +
          r +
          " " +
          r +
          " 0 1 1 " +
          cx +
          " " +
          (cy + r) +
          " A" +
          r +
          " " +
          r +
          " 0 1 1 " +
          cx +
          " " +
          (cy - r) +
          'Z")'
        );
      }

      function updateMoonClip() {
        moonEl.style.clipPath = moonClipPath(shadow.cx, shadow.cy, shadow.r);
      }

      // Fade in and start the clip reveal together with the drop
      tl.fromTo(
        "#moon-img",
        { opacity: 0 },
        {
          opacity: 1,
          duration: 0.3,
          ease: "power2.out",
          onStart: updateMoonClip,
        },
        0.15,
      );
      // Shadow circle shrinks and slides upper-right → crescent revealed
      tl.to(
        shadow,
        {
          cx: 255,
          cy: 165,
          r: 135,
          duration: 1.1,
          ease: "power2.inOut",
          onUpdate: updateMoonClip,
        },
        0.2,
      );
      // Clear the clip-path once the reveal is done so breathe phase is clean
      tl.set(moonEl, { clipPath: "none" }, 1.35);

      // Bloom fades in as crescent becomes visible
      tl.fromTo(
        "#moon-bloom",
        { opacity: 0, scale: 0.55 },
        {
          opacity: 1,
          scale: 1.0,
          duration: 0.9,
          ease: "power2.out",
          overwrite: "auto",
        },
        0.4,
      );

      // ─── DOTS ENTRANCE  1.85 → 2.50s ────────────────────────────────────────
      // Dots sweep in with a clip-path reveal from left to right
      tl.fromTo(
        "#dots-img",
        { opacity: 0, clipPath: "inset(0 100% 0 0)" },
        {
          opacity: 1,
          clipPath: "inset(0 0% 0 0)",
          duration: 0.65,
          ease: "expo.out",
        },
        1.85,
      );

      // ─── WORDMARK ENTRANCE  2.30 → 3.10s ────────────────────────────────────
      tl.fromTo(
        "#wordmark",
        { opacity: 0, filter: "blur(18px)" },
        {
          opacity: 1,
          filter: "blur(0px)",
          duration: 0.90,
          ease: "power2.out",
        },
        2.30,
      );

      window.__timelines["nocturne-logo"] = tl;
    </script>
  </body>
</html>
