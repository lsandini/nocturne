services:
  nocturne-postgres-server:
    image: "docker.io/library/postgres:17.6"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "${POSTGRES_USERNAME}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "nocturne"
      NOCTURNE_MIGRATOR_PASSWORD: "${POSTGRES_MIGRATOR_PASSWORD}"
      NOCTURNE_APP_PASSWORD: "${POSTGRES_APP_PASSWORD}"
      NOCTURNE_WEB_PASSWORD: "${POSTGRES_WEB_PASSWORD}"
    expose:
      - "5432"
    volumes:
      - type: "bind"
        target: "/docker-entrypoint-initdb.d"
        source: "./init"
        read_only: true
      - type: "volume"
        target: "/var/lib/postgresql/data"
        source: "nocturne-postgres-data"
        read_only: false
    networks:
      - "aspire"
  nocturne-api:
    image: "${NOCTURNE_API_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${NOCTURNE_API_PORT}"
      INSTANCE_KEY: "${INSTANCE_KEY}"
      ConnectionStrings__nocturne-postgres: "Host=nocturne-postgres-server;Port=5432;Database=nocturne;Username=nocturne_app;Password=${POSTGRES_APP_PASSWORD}"
      ConnectionStrings__nocturne-postgres-migrator: "Host=nocturne-postgres-server;Port=5432;Database=nocturne;Username=nocturne_migrator;Password=${POSTGRES_MIGRATOR_PASSWORD}"
      DemoService__Enabled: "false"
      WEB_URL: "http://nocturne-web:8000"
      SCALAR_CUSTOM_CSS: "\n\n\n\n/* Theme Imports - All themes are loaded for runtime switching */\n/* Nocturne theme is default; others activate via class on document root */\n\n\n\n\n\n\n\n:root {\n  --radius: 0.625rem;\n  --background: oklch(1 0 0);\n  --foreground: oklch(0.13 0.028 261.692);\n  --card: oklch(1 0 0);\n  --card-foreground: oklch(0.13 0.028 261.692);\n  --popover: oklch(1 0 0);\n  --popover-foreground: oklch(0.13 0.028 261.692);\n  --primary: oklch(0.21 0.034 264.665);\n  --primary-foreground: oklch(0.985 0.002 247.839);\n  --secondary: oklch(0.967 0.003 264.542);\n  --secondary-foreground: oklch(0.21 0.034 264.665);\n  --muted: oklch(0.967 0.003 264.542);\n  --muted-foreground: oklch(0.551 0.027 264.364);\n  --accent: oklch(0.967 0.003 264.542);\n  --accent-foreground: oklch(0.21 0.034 264.665);\n  --destructive: oklch(0.577 0.245 27.325);\n  --border: oklch(0.928 0.006 264.531);\n  --input: oklch(0.928 0.006 264.531);\n  --ring: oklch(0.707 0.022 261.325);\n  --chart-1: oklch(0.646 0.222 41.116);\n  --chart-2: oklch(0.6 0.118 184.704);\n  --chart-3: oklch(0.398 0.07 227.392);\n  --chart-4: oklch(0.828 0.189 84.429);\n  --chart-5: oklch(0.769 0.188 70.08);\n  --percentile-outer: oklch(0.9 0.04 264);\n  --percentile-inner: oklch(0.78 0.08 264);\n  --percentile-median: oklch(0.45 0.18 264);\n  --sidebar: oklch(0.985 0.002 247.839);\n  --sidebar-foreground: oklch(0.13 0.028 261.692);\n  --sidebar-primary: oklch(0.21 0.034 264.665);\n  --sidebar-primary-foreground: oklch(0.985 0.002 247.839);\n  --sidebar-accent: oklch(0.967 0.003 264.542);\n  --sidebar-accent-foreground: oklch(0.21 0.034 264.665);\n  --sidebar-border: oklch(0.928 0.006 264.531);\n  --sidebar-ring: oklch(0.707 0.022 261.325);\n}\n\n.dark {\n  --background: oklch(0.13 0.028 261.692);\n  --foreground: oklch(0.985 0.002 247.839);\n  --card: oklch(0.21 0.034 264.665);\n  --card-foreground: oklch(0.985 0.002 247.839);\n  --popover: oklch(0.21 0.034 264.665);\n  --popover-foreground: oklch(0.985 0.002 247.839);\n  --primary: oklch(0.928 0.006 264.531);\n  --primary-foreground: oklch(0.21 0.034 264.665);\n  --secondary: oklch(0.278 0.033 256.848);\n  --secondary-foreground: oklch(0.985 0.002 247.839);\n  --muted: oklch(0.278 0.033 256.848);\n  --muted-foreground: oklch(0.707 0.022 261.325);\n  --accent: oklch(0.278 0.033 256.848);\n  --accent-foreground: oklch(0.985 0.002 247.839);\n  --destructive: oklch(0.704 0.191 22.216);\n  --border: oklch(1 0 0 / 10%);\n  --input: oklch(1 0 0 / 15%);\n  --ring: oklch(0.551 0.027 264.364);\n  --chart-1: oklch(0.488 0.243 264.376);\n  --chart-2: oklch(0.696 0.17 162.48);\n  --chart-3: oklch(0.769 0.188 70.08);\n  --chart-4: oklch(0.627 0.265 303.9);\n  --chart-5: oklch(0.645 0.246 16.439);\n  --percentile-outer: oklch(0.28 0.06 264);\n  --percentile-inner: oklch(0.38 0.12 264);\n  --percentile-median: oklch(0.75 0.18 264);\n  --sidebar: oklch(0.21 0.034 264.665);\n  --sidebar-foreground: oklch(0.985 0.002 247.839);\n  --sidebar-primary: oklch(0.488 0.243 264.376);\n  --sidebar-primary-foreground: oklch(0.985 0.002 247.839);\n  --sidebar-accent: oklch(0.278 0.033 256.848);\n  --sidebar-accent-foreground: oklch(0.985 0.002 247.839);\n  --sidebar-border: oklch(1 0 0 / 10%);\n  --sidebar-ring: oklch(0.551 0.027 264.364);\n}\r\n.dark-mode {\n  --background: oklch(0.13 0.028 261.692);\n  --foreground: oklch(0.985 0.002 247.839);\n  --card: oklch(0.21 0.034 264.665);\n  --card-foreground: oklch(0.985 0.002 247.839);\n  --popover: oklch(0.21 0.034 264.665);\n  --popover-foreground: oklch(0.985 0.002 247.839);\n  --primary: oklch(0.928 0.006 264.531);\n  --primary-foreground: oklch(0.21 0.034 264.665);\n  --secondary: oklch(0.278 0.033 256.848);\n  --secondary-foreground: oklch(0.985 0.002 247.839);\n  --muted: oklch(0.278 0.033 256.848);\n  --muted-foreground: oklch(0.707 0.022 261.325);\n  --accent: oklch(0.278 0.033 256.848);\n  --accent-foreground: oklch(0.985 0.002 247.839);\n  --destructive: oklch(0.704 0.191 22.216);\n  --border: oklch(1 0 0 / 10%);\n  --input: oklch(1 0 0 / 15%);\n  --ring: oklch(0.551 0.027 264.364);\n  --chart-1: oklch(0.488 0.243 264.376);\n  --chart-2: oklch(0.696 0.17 162.48);\n  --chart-3: oklch(0.769 0.188 70.08);\n  --chart-4: oklch(0.627 0.265 303.9);\n  --chart-5: oklch(0.645 0.246 16.439);\n  --percentile-outer: oklch(0.28 0.06 264);\n  --percentile-inner: oklch(0.38 0.12 264);\n  --percentile-median: oklch(0.75 0.18 264);\n  --sidebar: oklch(0.21 0.034 264.665);\n  --sidebar-foreground: oklch(0.985 0.002 247.839);\n  --sidebar-primary: oklch(0.488 0.243 264.376);\n  --sidebar-primary-foreground: oklch(0.985 0.002 247.839);\n  --sidebar-accent: oklch(0.278 0.033 256.848);\n  --sidebar-accent-foreground: oklch(0.985 0.002 247.839);\n  --sidebar-border: oklch(1 0 0 / 10%);\n  --sidebar-ring: oklch(0.551 0.027 264.364);\n}\n\n\n\n@layer components {\n  .stack {\n    \n  }\n}\n@layer base {\n  * {\n    \n  }\n  body {\n    \n  }\n}\n\n@font-face {\n  font-family: \"Montserrat\";\n  src: url(\"/fonts/Montserrat-VariableFont_wght.ttf\")\n    format(\"truetype-variations\");\n  font-weight: 100 900;\n  font-display: swap;\n}\n\n@font-face {\n  font-family: \"Cabin\";\n  src: url(\"/fonts/Cabin-VariableFont_wdth,wght.ttf\")\n    format(\"truetype-variations\");\n  font-weight: 400 700;\n  font-display: swap;\n}\n\nbody {\n  font-family: \"Cabin\", sans-serif;\n}\n\n.font-brand {\n  font-family: \"Montserrat\", sans-serif;\n}\n\r\n/* Nocturne Theme - Diabetes-specific color variables */\n\n:root {\n  /* Glucose Levels */\n  --glucose-in-range: oklch(0.6 0.118 184.704);\n  --glucose-tight-range: oklch(0.72 0.16 150);\n  --glucose-low: oklch(0.646 0.222 41.116);\n  --glucose-very-low: oklch(0.577 0.245 27.325);\n  --glucose-high: oklch(0.65 0.18 270);\n  --glucose-very-high: oklch(0.55 0.25 15);\n\n  /* OpenAPS Prediction Lines */\n  --pred-iob: oklch(0.6 0.18 258);       /* blue, was #1e88e5 */\n  --pred-cob: oklch(0.7 0.18 50);        /* orange, was #FB8C00 */\n  --pred-acob: oklch(0.7 0.18 50);       /* orange, was #FB8C00 */\n  --pred-zt: oklch(0.75 0.15 195);       /* teal, was #00d2d2 */\n  --pred-uam: oklch(0.75 0.12 85);       /* yellow-green, was #c9bd60 */\n\n  /* Insulin Types */\n  --insulin: rgb(30, 150, 252);\n  --insulin-bolus: rgba(30, 150, 252, 1);\n  --insulin-basal: rgba(100, 180, 255, 0.3);\n  --insulin-temp-basal: rgba(140, 200, 255, 0.4);\n  --insulin-manual-temp-basal: rgba(30, 150, 252, 0.8);\n  --insulin-scheduled-basal: rgb(100, 180, 255); /* Opaque --insulin-basal for chart fills */\n  --insulin-additional-basal: rgb(140, 200, 255); /* Opaque --insulin-temp-basal for chart fills */\n\n  /* Carbohydrates */\n  --carbs: oklch(0.769 0.188 70.08);\n  --carbs-on-board: oklch(62.447% 0.13042 69.605);\n\n  /* Status Colors */\n  --status-warning: oklch(0.646 0.222 41.116);\n  --status-critical: oklch(0.577 0.245 27.325);\n  --status-normal: oklch(0.6 0.118 184.704);\n\n  /* IOB (Insulin on Board) - for charts - should be more prominent than basal */\n  --iob-basal: rgba(30, 150, 252, 0.7);\n  --iob-bolus: rgba(30, 150, 252, 1);\n  --iob-temporary: rgba(80, 170, 255, 0.8);\n\n  /* Pump Mode States */\n  --pump-mode-automatic: oklch(0.6 0.118 184.704); /* Green - full automation */\n  --pump-mode-limited: oklch(\n    0.7 0.12 220\n  ); /* Light blue - partial automation */\n  --pump-mode-manual: oklch(0.6 0.03 270); /* Gray - open loop */\n  --pump-mode-boost: oklch(0.7 0.2 50); /* Orange - aggressive delivery */\n  --pump-mode-ease-off: oklch(\n    0.65 0.15 100\n  ); /* Yellow-green - reduced delivery */\n  --pump-mode-sleep: oklch(0.5 0.1 280); /* Purple - sleep mode */\n  --pump-mode-exercise: oklch(0.65 0.18 140); /* Teal - activity mode */\n  --pump-mode-suspended: oklch(\n    0.6 0.22 30\n  ); /* Red-orange - insulin suspended */\n  --pump-mode-off: oklch(0.4 0.05 270); /* Dark gray - pump off */\n\n  /* System Event Severity */\n  --system-event-alarm: oklch(0.577 0.245 27.325); /* Red - critical alarm */\n  --system-event-hazard: oklch(0.646 0.222 41.116); /* Orange - hazard */\n  --system-event-warning: oklch(0.769 0.188 70.08); /* Yellow - warning */\n  --system-event-info: oklch(0.6 0.118 184.704); /* Green - informational */\n\n  /* Glycemia Risk Index (GRI) Zones */\n  --gri-zone-a: oklch(0.72 0.17 145);   /* Green - best glycemia */\n  --gri-zone-b: oklch(0.78 0.15 120);   /* Yellow-green */\n  --gri-zone-c: oklch(0.80 0.16 90);    /* Yellow */\n  --gri-zone-d: oklch(0.70 0.17 55);    /* Orange */\n  --gri-zone-e: oklch(0.60 0.20 25);    /* Red - worst glycemia */\n\n  /* Data Exclusion - semi-transparent overlays for excluded data regions */\n  --data-exclusion-compression-low: rgba(255, 165, 0, 0.15); /* Orange tint for compression lows */\n  --data-exclusion-sensor-error: rgba(255, 0, 0, 0.1); /* Red tint for sensor errors */\n\n  /* Health Overlays */\n  --heart-rate: oklch(0.6 0.2 25);\n  --steps: oklch(0.6 0.15 300);\n}\n\n.dark {\n  /* Insulin Types - Dark Mode - need higher opacity for visibility */\n  --insulin-basal: rgba(100, 180, 255, 0.35);\n  --insulin-temp-basal: rgba(140, 200, 255, 0.5);\n  --insulin-manual-temp-basal: rgba(30, 150, 252, 0.9);\n\n  /* IOB - Dark Mode - more saturated for contrast */\n  --iob-basal: rgba(60, 160, 255, 0.8);\n  --iob-bolus: rgba(30, 150, 252, 1);\n  --iob-temporary: rgba(100, 180, 255, 0.85);\n\n  /* Data Exclusion - Dark Mode - slightly higher opacity for visibility on dark backgrounds */\n  --data-exclusion-compression-low: rgba(255, 165, 0, 0.2);\n  --data-exclusion-sensor-error: rgba(255, 0, 0, 0.15);\n}\r\n.dark-mode {\n  /* Insulin Types - Dark Mode - need higher opacity for visibility */\n  --insulin-basal: rgba(100, 180, 255, 0.35);\n  --insulin-temp-basal: rgba(140, 200, 255, 0.5);\n  --insulin-manual-temp-basal: rgba(30, 150, 252, 0.9);\n\n  /* IOB - Dark Mode - more saturated for contrast */\n  --iob-basal: rgba(60, 160, 255, 0.8);\n  --iob-bolus: rgba(30, 150, 252, 1);\n  --iob-temporary: rgba(100, 180, 255, 0.85);\n\n  /* Data Exclusion - Dark Mode - slightly higher opacity for visibility on dark backgrounds */\n  --data-exclusion-compression-low: rgba(255, 165, 0, 0.2);\n  --data-exclusion-sensor-error: rgba(255, 0, 0, 0.15);\n}\n\n/* Tailwind theme integration */\n\n\r\n:root, .light-mode {\n  --scalar-color-1: var(--foreground);\n  --scalar-color-2: var(--muted-foreground);\n  --scalar-color-3: var(--muted-foreground);\n  --scalar-color-accent: var(--primary);\n  --scalar-background-1: var(--background);\n  --scalar-background-2: var(--card);\n  --scalar-background-3: var(--muted);\n  --scalar-background-accent: color-mix(in oklab, var(--primary) 12%, transparent);\n  --scalar-border-color: var(--border);\n  --scalar-color-green: var(--status-normal);\n  --scalar-color-red: var(--destructive);\n  --scalar-color-yellow: var(--system-event-warning);\n  --scalar-color-orange: var(--status-warning);\n  --scalar-button-1: var(--primary);\n  --scalar-button-1-color: var(--primary-foreground);\n  --scalar-button-1-hover: var(--accent);\n  --scalar-radius: calc(var(--radius) - 4px);\n  --scalar-radius-lg: var(--radius);\n  --scalar-radius-xl: calc(var(--radius) + 4px);\n  --scalar-font: \"Montserrat\", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, \"Helvetica Neue\", Arial, sans-serif;\n  --scalar-font-code: ui-monospace, SFMono-Regular, \"SF Mono\", Menlo, Consolas, \"Liberation Mono\", monospace;\n}\n.dark-mode {\n  --scalar-background-accent: color-mix(in oklab, var(--primary) 22%, transparent);\n}\r\n"
      BASE_DOMAIN: "${BASE_DOMAIN}"
    expose:
      - "${NOCTURNE_API_PORT}"
    depends_on:
      nocturne-postgres-server:
        condition: "service_started"
    networks:
      - "aspire"
  nocturne-web:
    image: "${NOCTURNE_WEB_IMAGE}"
    environment:
      PORT: "8000"
      NOCTURNE_API_HTTP: "http://nocturne-api:${NOCTURNE_API_PORT}"
      services__nocturne-api__http__0: "http://nocturne-api:${NOCTURNE_API_PORT}"
      PUBLIC_API_URL: "http://nocturne-api:${NOCTURNE_API_PORT}"
      NOCTURNE_API_URL: "http://nocturne-api:${NOCTURNE_API_PORT}"
      INSTANCE_KEY: "${INSTANCE_KEY}"
      DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN}"
      DISCORD_PUBLIC_KEY: "${DISCORD_PUBLIC_KEY}"
      DISCORD_APPLICATION_ID: "${DISCORD_APPLICATION_ID}"
      DISCORD_CLIENT_SECRET: "${DISCORD_CLIENT_SECRET}"
      BASE_DOMAIN: "${BASE_DOMAIN}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_WEBHOOK_SECRET_TOKEN: "${TELEGRAM_WEBHOOK_SECRET_TOKEN}"
      SLACK_BOT_TOKEN: "${SLACK_BOT_TOKEN}"
      SLACK_SIGNING_SECRET: "${SLACK_SIGNING_SECRET}"
      WHATSAPP_ACCESS_TOKEN: "${WHATSAPP_ACCESS_TOKEN}"
      WHATSAPP_VERIFY_TOKEN: "${WHATSAPP_VERIFY_TOKEN}"
      WHATSAPP_APP_SECRET: "${WHATSAPP_APP_SECRET}"
      WHATSAPP_PHONE_NUMBER_ID: "${WHATSAPP_PHONE_NUMBER_ID}"
      ORIGIN: "https://${BASE_DOMAIN}"
      NOCTURNE_POSTGRES_URI: "postgresql://nocturne_web:${POSTGRES_WEB_PASSWORD}@nocturne-postgres-server:5432/nocturne"
    expose:
      - "8000"
    depends_on:
      nocturne-api:
        condition: "service_started"
    networks:
      - "aspire"
  gateway:
    image: "mcr.microsoft.com/dotnet/nightly/yarp:2.3-preview"
    command:
      - "/app/yarp.dll"
    entrypoint:
      - "dotnet"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      REVERSEPROXY__CLUSTERS__cluster_nocturne-web__HTTPREQUEST__ACTIVITYTIMEOUT: "00:05:00"
      REVERSEPROXY__ROUTES__route0__MATCH__PATH: "/api/auth/oidc/{**catch-all}"
      REVERSEPROXY__ROUTES__route0__CLUSTERID: "cluster_nocturne-api"
      REVERSEPROXY__ROUTES__route0__TRANSFORMS__0__X-Forwarded: "Off"
      REVERSEPROXY__ROUTES__route0__TRANSFORMS__0__HeaderPrefix: "X-Forwarded-"
      REVERSEPROXY__ROUTES__route1__MATCH__PATH: "/api/oauth/{**catch-all}"
      REVERSEPROXY__ROUTES__route1__CLUSTERID: "cluster_nocturne-api"
      REVERSEPROXY__ROUTES__route1__TRANSFORMS__0__X-Forwarded: "Off"
      REVERSEPROXY__ROUTES__route1__TRANSFORMS__0__HeaderPrefix: "X-Forwarded-"
      REVERSEPROXY__ROUTES__route2__MATCH__PATH: "/api/v4/dev-only/{**catch-all}"
      REVERSEPROXY__ROUTES__route2__CLUSTERID: "cluster_nocturne-api"
      REVERSEPROXY__ROUTES__route2__TRANSFORMS__0__X-Forwarded: "Off"
      REVERSEPROXY__ROUTES__route2__TRANSFORMS__0__HeaderPrefix: "X-Forwarded-"
      REVERSEPROXY__ROUTES__route3__MATCH__PATH: "/api/{**catch-all}"
      REVERSEPROXY__ROUTES__route3__CLUSTERID: "cluster_nocturne-web"
      REVERSEPROXY__ROUTES__route3__TRANSFORMS__0__X-Forwarded: "Off"
      REVERSEPROXY__ROUTES__route3__TRANSFORMS__0__HeaderPrefix: "X-Forwarded-"
      REVERSEPROXY__ROUTES__route4__MATCH__PATH: "/auth/bot/{**catch-all}"
      REVERSEPROXY__ROUTES__route4__CLUSTERID: "cluster_nocturne-web"
      REVERSEPROXY__ROUTES__route4__TRANSFORMS__0__X-Forwarded: "Off"
      REVERSEPROXY__ROUTES__route4__TRANSFORMS__0__HeaderPrefix: "X-Forwarded-"
      REVERSEPROXY__ROUTES__route5__MATCH__PATH: "/scalar"
      REVERSEPROXY__ROUTES__route5__CLUSTERID: "cluster_nocturne-api"
      REVERSEPROXY__ROUTES__route5__TRANSFORMS__0__X-Forwarded: "Off"
      REVERSEPROXY__ROUTES__route5__TRANSFORMS__0__HeaderPrefix: "X-Forwarded-"
      REVERSEPROXY__ROUTES__route6__MATCH__PATH: "/scalar/{**catch-all}"
      REVERSEPROXY__ROUTES__route6__CLUSTERID: "cluster_nocturne-api"
      REVERSEPROXY__ROUTES__route6__TRANSFORMS__0__X-Forwarded: "Off"
      REVERSEPROXY__ROUTES__route6__TRANSFORMS__0__HeaderPrefix: "X-Forwarded-"
      REVERSEPROXY__ROUTES__route7__MATCH__PATH: "/openapi/{**catch-all}"
      REVERSEPROXY__ROUTES__route7__CLUSTERID: "cluster_nocturne-api"
      REVERSEPROXY__ROUTES__route7__TRANSFORMS__0__X-Forwarded: "Off"
      REVERSEPROXY__ROUTES__route7__TRANSFORMS__0__HeaderPrefix: "X-Forwarded-"
      REVERSEPROXY__ROUTES__route8__MATCH__PATH: "/.well-known/{**catch-all}"
      REVERSEPROXY__ROUTES__route8__CLUSTERID: "cluster_nocturne-api"
      REVERSEPROXY__ROUTES__route8__TRANSFORMS__0__X-Forwarded: "Off"
      REVERSEPROXY__ROUTES__route8__TRANSFORMS__0__HeaderPrefix: "X-Forwarded-"
      REVERSEPROXY__ROUTES__route9__MATCH__PATH: "/{**catchall}"
      REVERSEPROXY__ROUTES__route9__CLUSTERID: "cluster_nocturne-web"
      REVERSEPROXY__ROUTES__route9__TRANSFORMS__0__X-Forwarded: "Off"
      REVERSEPROXY__ROUTES__route9__TRANSFORMS__0__HeaderPrefix: "X-Forwarded-"
      REVERSEPROXY__CLUSTERS__cluster_nocturne-api__DESTINATIONS__destination1__ADDRESS: "http://nocturne-api"
      REVERSEPROXY__CLUSTERS__cluster_nocturne-web__DESTINATIONS__destination1__ADDRESS: "http://nocturne-web"
      NOCTURNE_API_HTTP: "http://nocturne-api:${NOCTURNE_API_PORT}"
      services__nocturne-api__http__0: "http://nocturne-api:${NOCTURNE_API_PORT}"
      NOCTURNE_WEB_HTTP: "http://nocturne-web:8000"
      services__nocturne-web__http__0: "http://nocturne-web:8000"
    ports:
      - "8080:5000"
    depends_on:
      nocturne-api:
        condition: "service_started"
      nocturne-web:
        condition: "service_started"
    networks:
      - "aspire"
  watchtower:
    image: "ghcr.io/nicholas-fedor/watchtower:latest"
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "86400"
      WATCHTOWER_INCLUDE_STOPPED: "false"
      WATCHTOWER_REVIVE_STOPPED: "false"
    volumes:
      - type: "bind"
        target: "/var/run/docker.sock"
        source: "/var/run/docker.sock"
        read_only: false
    networks:
      - "aspire"
networks:
  aspire:
    driver: "bridge"
volumes:
  nocturne-postgres-data:
    driver: "local"
